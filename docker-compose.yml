# Docker Compose Configuration for DeepSeek Data Classification System

version: '3.8'

services:
  # FastAPI Inference Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: deepseek-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./outputs:/app/outputs
    environment:
      - MODEL_PATH=/app/models/deepseek-llm-7b-chat
      - OUTPUT_PATH=/app/outputs/finetuned
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python scripts/api_server.py --host 0.0.0.0 --port 8000

  # Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deepseek-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: npm run dev

  # Frontend (Production)
  # frontend-prod:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.prod
  #   container_name: deepseek-frontend-prod
  #   ports:
  #     - "80:80"
  #   environment:
  #     - VITE_API_BASE_URL=http://api:8000

networks:
  default:
    name: deepseek-network
